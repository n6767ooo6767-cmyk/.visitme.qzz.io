<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>visitme.qzz.io</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1020;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      max-width: 800px;
      padding: 40px;
      background: #17182e;
      border-radius: 24px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      color: #9b7cff;
    }

    p {
      font-size: 20px;
      color: #d5d5e8;
    }

    .domain {
      margin: 30px 0;
      padding: 20px;
      background: #0b0c18;
      border: 2px solid #9b7cff;
      border-radius: 16px;
      font-size: 28px;
      font-family: monospace;
    }

    input {
      padding: 14px;
      width: 70%;
      border-radius: 10px;
      border: none;
      font-size: 18px;
      margin-top: 20px;
    }

    .result {
      margin-top: 15px;
      font-size: 22px;
      color: #8affb5;
    }

    a {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 24px;
      background: #9b7cff;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>visitme.qzz.io</h1>
    <p>Get your own free subdomain for your page, portfolio, project or game.</p>

    <div class="domain">
      yourname.visitme.qzz.io
    </div>

    <input id="nameInput" placeholder="Enter your name" oninput="checkName()" />

    <div class="result" id="result">
      Type a name to preview your subdomain
    </div>

    <a href="https://github.com/" target="_blank">Request on GitHub</a>
  </div>

  <script>
    function checkName() {
      const input = document.getElementById("nameInput");
      const result = document.getElementById("result");

      let name = input.value
        .toLowerCase()
        .replace(/[^a-z0-9-]/g, "");

      if (!name) {
        result.textContent = "Type a name to preview your subdomain";
        return;
      }

      result.textContent = name + ".visitme.qzz.io";
    }
  </script>
</body>
</html>
