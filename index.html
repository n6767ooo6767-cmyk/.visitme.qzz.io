<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisitMe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f1020;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
max-width:800px;
width:100%;
background:#17182e;
padding:40px;
border-radius:24px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,.4);
}

h1{
font-size:56px;
margin-bottom:10px;
color:#9b7cff;
}

.subtitle{
font-size:20px;
color:#d8d8e8;
margin-bottom:30px;
}

.domain{
background:#0b0c18;
border:2px solid #9b7cff;
padding:18px;
border-radius:16px;
font-size:28px;
font-family:monospace;
margin-bottom:25px;
}

input{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:18px;
margin-bottom:20px;
}

.result{
font-size:22px;
color:#89ffb2;
margin-bottom:30px;
min-height:30px;
}

.buttons{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{
display:inline-block;
padding:14px 24px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
color:white;
transition:.2s;
}

.btn:hover{
transform:translateY(-2px);
}

.primary{
background:#9b7cff;
}

.support{
background:#ff5f7a;
}

.info{
margin-top:40px;
padding:25px;
background:#0b0c18;
border-radius:16px;
}

.info h3{
margin-bottom:10px;
}

.info p{
color:#d5d5e8;
line-height:1.6;
}

.footer{
margin-top:30px;
font-size:14px;
color:#8f8fa8;
}

</style>

</head>
<body>

<div class="card">

<h1>VisitMe</h1>

<p class="subtitle">
Get your free subdomain for websites, portfolios, projects and games.
</p>

<div class="domain">
yourname.visitme.qzz.io
</div>

<input
id="nameInput"
placeholder="Enter your name..."
oninput="updatePreview()">

<div class="result" id="result">
Type a name to preview your subdomain
</div>

<div class="buttons">

<a
class="btn primary"
href="https://github.com/n6767ooo6767/visitme.qzz.io"
target="_blank">
Get Subdomain
</a>

<a
class="btn support"
href="https://dalink.to/visitme_real"
target="_blank">
❤️ Say Thanks
</a>

</div>

<div class="info">

<h3>Examples</h3>

<p>
alex.visitme.qzz.io<br>
game.visitme.qzz.io<br>
portfolio.visitme.qzz.io<br>
blog.visitme.qzz.io
</p>

</div>

<div class="footer">
VisitMe © 2026
</div>

</div>

<script>

function updatePreview(){

const input=document.getElementById("nameInput");
const result=document.getElementById("result");

let value=input.value
.toLowerCase()
.replace(/[^a-z0-9-]/g,'');

if(!value){
result.textContent="Type a name to preview your subdomain";
return;
}

result.textContent=value + ".visitme.qzz.io";

}

</script>

</body>
</html>
